<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HAIL MARY — Stellar Navigation</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#00010a; color:#7af; font-family:'Share Tech Mono',monospace; overflow:hidden; }
    #c { position:fixed; inset:0; width:100%; height:100%; }
    #scanlines {
      position:fixed; inset:0; pointer-events:none; z-index:10;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.13) 2px,rgba(0,0,0,.13) 4px);
    }
    #vignette {
      position:fixed; inset:0; pointer-events:none; z-index:9;
      background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,20,.75) 100%);
    }
    #hud { position:fixed; inset:0; pointer-events:none; z-index:20; }

    .title {
      position:absolute; top:18px; left:50%; transform:translateX(-50%);
      font-size:1.3em; letter-spacing:.45em; color:#8cf;
      text-shadow:0 0 18px #4af,0 0 40px #28f;
      border-bottom:1px solid rgba(100,200,255,.25); padding-bottom:7px;
      white-space:nowrap;
    }
    .tabs {
      position:absolute; top:18px; right:20px;
      display:flex; gap:10px;
    }
    .tab {
      font-size:.6em; letter-spacing:.2em; padding:4px 10px;
      border:1px solid rgba(100,200,255,.25); color:rgba(100,200,255,.4);
    }
    .tab.active {
      color:#8cf; border-color:rgba(100,200,255,.7);
      background:rgba(100,200,255,.08); text-shadow:0 0 8px #4af;
    }

    #dest-panel {
      position:absolute; top:18px; left:20px;
      font-size:.68em; border:1px solid rgba(255,100,70,.3);
      padding:10px 16px; background:rgba(20,0,0,.75);
      color:rgba(255,100,70,.8);
    }
    .dest-title { letter-spacing:.25em; margin-bottom:5px; font-size:.9em; }
    .dest-name { color:#f87; font-size:1.5em; text-shadow:0 0 12px #f42; }
    .dest-sub { margin-top:5px; color:rgba(255,100,70,.55); font-size:.9em; }

    #info-panel {
      position:absolute; bottom:44px; left:20px;
      font-size:.68em; line-height:1.8;
      border:1px solid rgba(100,200,255,.2);
      padding:12px 18px; background:rgba(0,5,20,.8); min-width:210px;
    }
    .lbl { color:rgba(100,200,255,.45); letter-spacing:.12em; font-size:.88em; }
    .val { color:#cef; }
    #star-name { color:#8cf; font-size:1.35em; text-shadow:0 0 10px #4af; }

    #nav-buttons {
      position:absolute; bottom:44px; right:20px;
      display:flex; flex-direction:column; gap:8px; pointer-events:all;
    }
    .nav-btn {
      font-family:'Share Tech Mono',monospace;
      font-size:.62em; letter-spacing:.22em; padding:7px 16px; cursor:pointer;
      border:1px solid rgba(100,200,255,.35); background:rgba(0,5,20,.85);
      color:#8cf; transition:all .18s;
    }
    .nav-btn:hover {
      background:rgba(100,200,255,.13); text-shadow:0 0 8px #4af; border-color:#6af;
    }

    .gaia-label {
      position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
      font-size:.52em; letter-spacing:.35em; color:rgba(100,200,255,.3);
      white-space:nowrap;
    }

    /* Corner brackets */
    .corner { position:absolute; width:24px; height:24px; }
    .corner.tl { top:8px; left:8px; border-top:1px solid rgba(100,200,255,.35); border-left:1px solid rgba(100,200,255,.35); }
    .corner.tr { top:8px; right:8px; border-top:1px solid rgba(100,200,255,.35); border-right:1px solid rgba(100,200,255,.35); }
    .corner.bl { bottom:8px; left:8px; border-bottom:1px solid rgba(100,200,255,.35); border-left:1px solid rgba(100,200,255,.35); }
    .corner.br { bottom:8px; right:8px; border-bottom:1px solid rgba(100,200,255,.35); border-right:1px solid rgba(100,200,255,.35); }

    /* CSS2D labels */
    .star-label {
      font-family:'Share Tech Mono',monospace; font-size:10px;
      color:rgba(160,210,255,.7); letter-spacing:.1em; white-space:nowrap;
      pointer-events:none; padding-left:7px;
      text-shadow:0 0 5px rgba(80,160,255,.4);
    }
    .star-label.origin { color:rgba(255,220,100,.9); text-shadow:0 0 8px rgba(255,190,50,.55); }
    .star-label.dest   { color:rgba(255,110,80,.9);  text-shadow:0 0 8px rgba(255,70,30,.55); }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="hud">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="title">◈&nbsp;&nbsp;HAIL MARY — STELLAR NAVIGATION&nbsp;&nbsp;◈</div>

    <div class="tabs">
      <div class="tab active">NAVIGATION</div>
      <div class="tab">COLOR MAP</div>
      <div class="tab">SUPERNOVA</div>
    </div>

    <div id="dest-panel">
      <div class="dest-title">DESTINATION</div>
      <div class="dest-name">★&nbsp;TAU CETI</div>
      <div class="dest-sub">DIST: 3.651 PC &nbsp;/&nbsp; 11.91 LY</div>
    </div>

    <div id="info-panel">
      <div class="lbl">SELECTED OBJECT</div>
      <div id="star-name">SOL / EARTH</div>
      <div style="height:7px"></div>
      <div class="lbl">DISTANCE FROM SOL</div>
      <div class="val" id="star-dist">0.000 PC &nbsp;/&nbsp; 0.00 LY</div>
      <div style="height:4px"></div>
      <div class="lbl">SPECTRAL TYPE</div>
      <div class="val" id="star-sp">G2V</div>
    </div>

    <div id="nav-buttons">
      <button class="nav-btn" onclick="flyPreset('sol')">◈&nbsp; SOL SYSTEM</button>
      <button class="nav-btn" onclick="flyPreset('trajectory')">⟶&nbsp; TRAJECTORY</button>
      <button class="nav-btn" onclick="flyPreset('tauceti')">★&nbsp; TAU CETI</button>
      <button class="nav-btn" onclick="flyPreset('galactic')">⊕&nbsp; GALACTIC VIEW</button>
    </div>

    <div class="gaia-label">GAIA DR3 &nbsp;·&nbsp; HIPPARCOS &nbsp;·&nbsp; J2000 EQUATORIAL &nbsp;·&nbsp; 1 UNIT = 1 PARSEC</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls }    from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ── Star catalogue (real astrometric data) ────────────────────────────────
    const STARS = [
      { name:'SOL / EARTH',       ra:0,       dec:0,       dist:0,     sp:'G2V',   sz:2.2,  isOrigin:true },
      { name:'ALPHA CENTAURI',    ra:219.9,   dec:-60.84,  dist:1.339, sp:'G2V',   sz:1.4 },
      { name:"BARNARD'S STAR",    ra:269.45,  dec:4.693,   dist:1.828, sp:'M4Ve',  sz:0.75 },
      { name:'WOLF 359',          ra:164.12,  dec:7.015,   dist:2.386, sp:'M6Ve',  sz:0.65 },
      { name:'LALANDE 21185',     ra:165.83,  dec:35.968,  dist:2.547, sp:'M2Ve',  sz:0.8 },
      { name:'SIRIUS',            ra:101.29,  dec:-16.716, dist:2.637, sp:'A1Vm',  sz:1.9 },
      { name:'LUYTEN 726-8',      ra:24.76,   dec:-17.95,  dist:2.68,  sp:'M5Ve',  sz:0.6 },
      { name:'WISE 0855-0714',    ra:133.79,  dec:-7.24,   dist:2.231, sp:'Y',     sz:0.55 },
      { name:'ROSS 154',          ra:283.82,  dec:-23.84,  dist:2.97,  sp:'M3.5',  sz:0.65 },
      { name:'ROSS 248',          ra:355.00,  dec:44.17,   dist:3.162, sp:'M5.5',  sz:0.6 },
      { name:'EPSILON ERIDANI',   ra:53.23,   dec:-9.458,  dist:3.218, sp:'K2V',   sz:1.05 },
      { name:'LACAILLE 9352',     ra:346.47,  dec:-35.85,  dist:3.291, sp:'M1Ve',  sz:0.7 },
      { name:'ROSS 128',          ra:176.92,  dec:0.808,   dist:3.368, sp:'M4V',   sz:0.7 },
      { name:'PROCYON',           ra:114.83,  dec:5.227,   dist:3.497, sp:'F5IV',  sz:1.35 },
      { name:'61 CYGNI',          ra:316.73,  dec:38.75,   dist:3.498, sp:'K5V',   sz:0.9 },
      { name:'EPSILON INDI',      ra:330.84,  dec:-56.79,  dist:3.636, sp:'K5Ve',  sz:0.9 },
      { name:'TAU CETI',          ra:26.017,  dec:-15.938, dist:3.651, sp:'G8V',   sz:1.15, isDestination:true },
      { name:"TEEGARDEN'S STAR",  ra:37.50,   dec:8.37,    dist:3.831, sp:'M7V',   sz:0.55 },
      { name:"KAPTEYN'S STAR",    ra:77.93,   dec:-45.02,  dist:3.912, sp:'M1Vp',  sz:0.72 },
      { name:'KRUGER 60',         ra:315.17,  dec:56.86,   dist:4.0,   sp:'M2V',   sz:0.65 },
      { name:'40 ERIDANI',        ra:63.82,   dec:-7.65,   dist:4.983, sp:'K1Ve',  sz:1.0 },
      { name:'ETA CASSIOPEIAE',   ra:12.28,   dec:57.82,   dist:5.948, sp:'F9V',   sz:1.1 },
      { name:'POLLUX',            ra:116.33,  dec:28.03,   dist:10.34, sp:'K0III', sz:1.6 },
      { name:'ALDEBARAN',         ra:68.98,   dec:16.51,   dist:20.0,  sp:'K5III', sz:2.1 },
      { name:'REGULUS',           ra:152.09,  dec:11.97,   dist:24.3,  sp:'B7V',   sz:1.9 },
    ];

    // Spectral type → colour
    const SP_COLOR = {
      O:0x9bb0ff, B:0xaabfff, A:0xcad7ff, F:0xf8f7ff,
      G:0xfff4ea, K:0xffdab5, M:0xffaa80, Y:0x884422,
    };
    const spColor = sp => SP_COLOR[sp[0]] || 0xffffff;

    // Equatorial J2000 → Three.js XYZ  (x=East, y=North, z=toward-observer)
    function toVec3(ra_deg, dec_deg, dist_pc) {
      if (dist_pc === 0) return new THREE.Vector3(0, 0, 0);
      const ra = ra_deg * Math.PI / 180, dec = dec_deg * Math.PI / 180;
      return new THREE.Vector3(
        dist_pc * Math.cos(dec) * Math.cos(ra),
        dist_pc * Math.sin(dec),
       -dist_pc * Math.cos(dec) * Math.sin(ra)
      );
    }

    STARS.forEach(s => { s.pos = toVec3(s.ra, s.dec, s.dist); });
    const TAU = STARS.find(s => s.isDestination).pos;

    // ── Canvas texture helpers ────────────────────────────────────────────────
    function makeGlowTex(size = 64) {
      const c = document.createElement('canvas'); c.width = c.height = size;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
      g.addColorStop(0,   'rgba(255,255,255,1)');
      g.addColorStop(0.3, 'rgba(255,255,255,.65)');
      g.addColorStop(1,   'rgba(255,255,255,0)');
      ctx.fillStyle = g; ctx.fillRect(0,0,size,size);
      return new THREE.CanvasTexture(c);
    }

    function makeCrosshairTex(color = '#8cf', size = 64) {
      const c = document.createElement('canvas'); c.width = c.height = size;
      const ctx = c.getContext('2d');
      ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.globalAlpha = .9;
      const m = size / 2;
      // diamond
      ctx.beginPath();
      ctx.moveTo(m, 3); ctx.lineTo(m+9,m); ctx.lineTo(m,size-3); ctx.lineTo(m-9,m); ctx.closePath();
      ctx.stroke();
      // tick marks
      [[m-11,m, m-17,m],[m+11,m, m+17,m],[m,m-11, m,m-17],[m,m+11, m,m+17]].forEach(([x1,y1,x2,y2])=>{
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      });
      return new THREE.CanvasTexture(c);
    }

    function makeShipTex(size = 32) {
      const c = document.createElement('canvas'); c.width = c.height = size;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#ff6644'; ctx.globalAlpha = .9;
      ctx.beginPath();
      ctx.moveTo(size/2, 2); ctx.lineTo(size-3, size-2);
      ctx.lineTo(size/2, size-7); ctx.lineTo(3, size-2); ctx.closePath();
      ctx.fill();
      return new THREE.CanvasTexture(c);
    }

    // ── Renderer / Scene / Camera / Controls ─────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x00010a);

    const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.001, 800);
    camera.position.set(0.4, 1.8, 3.2);

    const renderer = new THREE.WebGLRenderer({ canvas:document.getElementById('c'), antialias:true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);

    const css2d = new CSS2DRenderer();
    css2d.setSize(innerWidth, innerHeight);
    css2d.domElement.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:5;';
    document.body.appendChild(css2d.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.08;
    controls.minDistance = 0.05; controls.maxDistance = 200;
    controls.target.set(0,0,0);

    // ── Background star field (70 k, concentrated along galactic plane) ───────
    const NGP = new THREE.Vector3(
       Math.cos(27.13*Math.PI/180) * Math.cos(192.85*Math.PI/180),
       Math.sin(27.13*Math.PI/180),
      -Math.cos(27.13*Math.PI/180) * Math.sin(192.85*Math.PI/180)
    ).normalize();

    const BG_N = 70000;
    const bgPos = new Float32Array(BG_N * 3);
    const bgCol = new Float32Array(BG_N * 3);
    const bgSz  = new Float32Array(BG_N);
    let bi = 0;
    const _dir = new THREE.Vector3();
    while (bi < BG_N) {
      _dir.set(Math.random()*2-1, Math.random()*2-1, Math.random()*2-1);
      if (_dir.lengthSq() > 1) continue;
      _dir.normalize();
      const galLat = Math.asin(Math.abs(_dir.dot(NGP)));
      const density = 0.18 + 0.82 * Math.exp(-galLat*galLat / 0.08);
      if (Math.random() > density) continue;
      const d = 30 + Math.random() * 270;
      bgPos[bi*3]   = _dir.x * d;
      bgPos[bi*3+1] = _dir.y * d;
      bgPos[bi*3+2] = _dir.z * d;
      const t = Math.random();
      bgCol[bi*3]   = 0.62 + t * 0.38;
      bgCol[bi*3+1] = 0.68 + t * 0.22;
      bgCol[bi*3+2] = 0.78 + (1-t) * 0.22;
      bgSz[bi] = 0.25 + Math.random() * 0.75;
      bi++;
    }

    const bgGeo = new THREE.BufferGeometry();
    bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
    bgGeo.setAttribute('color',    new THREE.BufferAttribute(bgCol, 3));
    bgGeo.setAttribute('size',     new THREE.BufferAttribute(bgSz,  1));

    const bgGlowTex = makeGlowTex(64);
    const bgMat = new THREE.ShaderMaterial({
      uniforms: { tex:{ value: bgGlowTex } },
      vertexShader:`
        attribute float size;
        attribute vec3 color;
        varying vec3 vColor;
        void main(){
          vColor = color;
          vec4 mv = modelViewMatrix * vec4(position,1.);
          gl_PointSize = size * (280. / -mv.z);
          gl_Position = projectionMatrix * mv;
        }`,
      fragmentShader:`
        uniform sampler2D tex;
        varying vec3 vColor;
        void main(){
          vec4 t = texture2D(tex, gl_PointCoord);
          if(t.a < .04) discard;
          gl_FragColor = vec4(vColor,1.) * t;
        }`,
      transparent:true, vertexColors:true, depthWrite:false,
    });
    scene.add(new THREE.Points(bgGeo, bgMat));

    // ── Reference grid ────────────────────────────────────────────────────────
    const grid = new THREE.GridHelper(60, 60, 0x0d2233, 0x071520);
    grid.material.opacity = 0.35; grid.material.transparent = true;
    scene.add(grid);

    // ── Sol–Tau Ceti trajectory arc ───────────────────────────────────────────
    const arcMid = TAU.clone().multiplyScalar(0.5).add(new THREE.Vector3(0, TAU.length()*0.28, 0));
    const curve  = new THREE.CatmullRomCurve3([new THREE.Vector3(0,0,0), arcMid, TAU.clone()]);
    const arcGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(150));
    const arcMat = new THREE.LineDashedMaterial({ color:0xff3322, dashSize:.16, gapSize:.08 });
    const arcLine = new THREE.Line(arcGeo, arcMat);
    arcLine.computeLineDistances();
    scene.add(arcLine);

    // Hail Mary ship marker at 70% of arc
    const shipPos = curve.getPoint(0.7);
    const shipGeo = new THREE.BufferGeometry().setFromPoints([shipPos]);
    const shipMat = new THREE.PointsMaterial({
      size:12, sizeAttenuation:false,
      map:makeShipTex(), transparent:true, depthWrite:false, color:0xff6644,
    });
    scene.add(new THREE.Points(shipGeo, shipMat));

    // ── Named star objects ────────────────────────────────────────────────────
    const starGlowTex = makeGlowTex(128);
    const hitObjects  = [];

    STARS.forEach(star => {
      const col = spColor(star.sp);

      // Glow sprite
      const spMat = new THREE.SpriteMaterial({
        map:starGlowTex, color:col,
        transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
      });
      const sprite = new THREE.Sprite(spMat);
      sprite.scale.setScalar(star.sz * 0.32);
      sprite.position.copy(star.pos);
      scene.add(sprite);

      // Crosshair
      const chColor = star.isOrigin ? '#ffd060' : star.isDestination ? '#ff7755' : '#66aaff';
      const chMat = new THREE.SpriteMaterial({
        map:makeCrosshairTex(chColor), transparent:true, depthWrite:false,
      });
      const ch = new THREE.Sprite(chMat);
      ch.scale.setScalar(star.sz * 0.18 + 0.20);
      ch.position.copy(star.pos);
      scene.add(ch);

      // Vertical drop-line to grid plane
      if (star.dist > 0) {
        const dropGeo = new THREE.BufferGeometry().setFromPoints([
          star.pos.clone(), new THREE.Vector3(star.pos.x, 0, star.pos.z),
        ]);
        const r = ((col>>16)&0xff)/255, g = ((col>>8)&0xff)/255, b = (col&0xff)/255;
        const dropMat = new THREE.LineBasicMaterial({
          color:new THREE.Color(r*.6,g*.6,b*.6), opacity:.22, transparent:true,
        });
        scene.add(new THREE.Line(dropGeo, dropMat));
      }

      // CSS2D label
      const div = document.createElement('div');
      div.className = 'star-label'
        + (star.isOrigin ? ' origin' : star.isDestination ? ' dest' : '');
      div.textContent = star.name;
      const lbl = new CSS2DObject(div);
      lbl.position.copy(star.pos);
      scene.add(lbl);

      // Invisible hit sphere for raycasting
      const hitGeo  = new THREE.SphereGeometry(Math.max(0.14, star.sz * 0.1), 6, 6);
      const hitMat  = new THREE.MeshBasicMaterial({ visible:false });
      const hitMesh = new THREE.Mesh(hitGeo, hitMat);
      hitMesh.position.copy(star.pos);
      hitMesh.userData = star;
      scene.add(hitMesh);
      hitObjects.push(hitMesh);
    });

    // ── Camera presets ────────────────────────────────────────────────────────
    const PRESETS = {
      sol:       { cam:new THREE.Vector3(0.4,1.8,3.2),  tgt:new THREE.Vector3(0,0,0) },
      trajectory:{ cam:new THREE.Vector3(4,7,14),        tgt:new THREE.Vector3(1.5,-.5,-.8) },
      tauceti:   { cam:TAU.clone().add(new THREE.Vector3(2,1.5,3)), tgt:TAU.clone() },
      galactic:  { cam:new THREE.Vector3(2,42,6),        tgt:new THREE.Vector3(0,0,0) },
    };
    window.flyPreset = k => {
      const p = PRESETS[k]; flyTo(p.cam, p.tgt, 1800);
    };

    // ── Smooth ease-in-out fly-to ─────────────────────────────────────────────
    function flyTo(cp, ct, ms) {
      const sc = camera.position.clone(), st = controls.target.clone(), t0 = performance.now();
      (function step() {
        const t = Math.min((performance.now()-t0)/ms, 1);
        const e = t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
        camera.position.lerpVectors(sc, cp, e);
        controls.target.lerpVectors(st, ct, e);
        controls.update();
        if (t < 1) requestAnimationFrame(step);
      })();
    }

    // ── Click / star selection ────────────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    raycaster.params.Points = { threshold:0.3 };
    const mouse = new THREE.Vector2();
    let isDragging = false;
    let mouseDownPos = { x:0, y:0 };

    renderer.domElement.addEventListener('mousedown', e => {
      mouseDownPos = { x:e.clientX, y:e.clientY }; isDragging = false;
    });
    renderer.domElement.addEventListener('mousemove', e => {
      const dx = e.clientX-mouseDownPos.x, dy = e.clientY-mouseDownPos.y;
      if (Math.sqrt(dx*dx+dy*dy) > 4) isDragging = true;
    });
    renderer.domElement.addEventListener('click', e => {
      if (isDragging) return;
      mouse.set((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(hitObjects);
      if (!hits.length) return;
      const star = hits[0].object.userData;
      updateInfoPanel(star);
      const off = camera.position.clone().sub(controls.target);
      off.normalize().multiplyScalar(Math.max(1.5, Math.min(off.length(), 6)));
      flyTo(star.pos.clone().add(off), star.pos.clone(), 1600);
    });

    function updateInfoPanel(star) {
      document.getElementById('star-name').textContent = star.name;
      document.getElementById('star-dist').textContent =
        star.dist.toFixed(3) + ' PC  /  ' + (star.dist*3.2616).toFixed(2) + ' LY';
      document.getElementById('star-sp').textContent = star.sp;
    }

    // ── Animate ───────────────────────────────────────────────────────────────
    let tick = 0;
    (function animate() {
      requestAnimationFrame(animate);
      tick += 0.012;
      shipMat.size = 9 + Math.sin(tick * 2.2) * 2.8;
      controls.update();
      renderer.render(scene, camera);
      css2d.render(scene, camera);
    })();

    // ── Resize ────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      css2d.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
